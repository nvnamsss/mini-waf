meta:
  author: Xhoenix, Esad Cetiner
rule_id: 956110
tests:
- test_id: 1
  desc: Ruby ERB Template leakage
  stages:
  - input:
      dest_addr: 127.0.0.1
      port: 8111
      headers:
        Host: localhost
        User-Agent: OWASP CRS test agent
        Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
        Accept-Encoding: gzip,deflate
        Accept-Language: en-us,en;q=0.5
        Content-Type: application/json
      method: POST
      version: HTTP/1.1
      uri: /reflect
      data: '{"body": "<% end %>"}'
      protocol: http
    output:
      status: 403
- test_id: 2
  desc: Ruby ERB Template leakage
  stages:
  - input:
      dest_addr: 127.0.0.1
      port: 8111
      headers:
        Host: localhost
        User-Agent: OWASP CRS test agent
        Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
        Accept-Encoding: gzip,deflate
        Accept-Language: en-us,en;q=0.5
        Content-Type: application/json
      method: POST
      version: HTTP/1.1
      uri: /reflect
      data: '{"body": "<p>Name: <%= @user.name %></p>"}'
      protocol: http
    output:
      status: 403
- test_id: 3
  desc: Ruby Slim Interpolation
  stages:
  - input:
      dest_addr: 127.0.0.1
      port: 8111
      headers:
        Host: localhost
        User-Agent: OWASP CRS test agent
        Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
        Accept-Encoding: gzip,deflate
        Accept-Language: en-us,en;q=0.5
        Content-Type: application/json
      method: POST
      version: HTTP/1.1
      uri: /reflect
      data: '{"body": "p Name: #{user.name}"}'
      protocol: http
    output:
      status: 403
- test_id: 4
  desc: 'False Positive: Don''t match templates for WordPress site customizer'
  stages:
  - input:
      dest_addr: 127.0.0.1
      port: 8111
      headers:
        Host: localhost
        User-Agent: OWASP CRS test agent
        Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
        Accept-Encoding: gzip,deflate
        Accept-Language: en-us,en;q=0.5
        Content-Type: text/html
      method: POST
      version: HTTP/1.1
      uri: /reflect
      data: <%- sidebar.id %>
      protocol: http
    output:
      status:
      - 200
      - 404
