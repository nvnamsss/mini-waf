meta:
  author: zoutjebot
rule_id: 934200
tests:
- test_id: 1
  desc: Jinja2/Twig SSTI - arithmetic in double curly braces
  stages:
  - input:
      dest_addr: 127.0.0.1
      headers:
        Accept: '*/*'
        Host: localhost
        User-Agent: OWASP CRS test agent
      method: GET
      port: 8111
      uri: /get?x=%7b%7b7*7%7d%7d
      version: HTTP/1.1
      protocol: http
    output:
      status: 403
- test_id: 2
  desc: Jinja2/Twig SSTI - dunder access in double curly braces
  stages:
  - input:
      dest_addr: 127.0.0.1
      headers:
        Accept: '*/*'
        Host: localhost
        User-Agent: OWASP CRS test agent
      method: GET
      port: 8111
      uri: /get?x=%7b%7b%27%27.__class__.__mro__%7d%7d
      version: HTTP/1.1
      protocol: http
    output:
      status: 403
- test_id: 3
  desc: Expression Language SSTI - function call in hash curly
  stages:
  - input:
      dest_addr: 127.0.0.1
      headers:
        Accept: '*/*'
        Host: localhost
        User-Agent: OWASP CRS test agent
      method: GET
      port: 8111
      uri: /get?x=%23%7bruntime.exec(%27id%27)%7d
      version: HTTP/1.1
      protocol: http
    output:
      status: 403
- test_id: 4
  desc: ERB SSTI - arithmetic in angle bracket percent
  stages:
