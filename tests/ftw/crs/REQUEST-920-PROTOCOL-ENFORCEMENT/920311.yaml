meta:
  author: csanders-git, azurit
rule_id: 920311
tests:
- test_id: 1
  stages:
  - input:
      dest_addr: 127.0.0.1
      port: 8111
      headers:
        Host: localhost
        Accept: ''
      uri: /
      version: HTTP/1.1
      protocol: http
    output:
      status: 403
- test_id: 2
  stages:
  - input:
      dest_addr: 127.0.0.1
      port: 8111
      method: OPTIONS
      headers:
        Host: localhost
        Accept: ''
        User-Agent: OWASP CRS test agent
      uri: /
      version: HTTP/1.1
      protocol: http
    output:
      status:
      - 200
      - 404
- test_id: 3
  stages:
  - input:
      dest_addr: 127.0.0.1
      port: 8111
      headers:
        User-Agent: OWASP CRS test agent
        Host: localhost
        Accept: text/plain, text/html
      uri: /
      version: HTTP/1.1
      protocol: http
    output:
      status:
      - 200
      - 404
