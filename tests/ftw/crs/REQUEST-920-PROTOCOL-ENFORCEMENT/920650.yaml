meta:
  author: fzipi, Esad Cetiner
  description: Tests for HTTP method override via _method parameter detection (920650)
rule_id: 920650
tests:
- test_id: 1
  desc: DELETE method override in query string
  stages:
  - input:
      dest_addr: 127.0.0.1
      port: 8111
      method: POST
      uri: /api/resource?_method=DELETE
      headers:
        User-Agent: OWASP CRS test agent
        Host: localhost
        Accept: '*/*'
      protocol: http
    output:
      status: 403
