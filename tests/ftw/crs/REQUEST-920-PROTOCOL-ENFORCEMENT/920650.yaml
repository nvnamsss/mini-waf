- test_id: 36
  desc: 'Logging out of GitLab, HTTP override method is same as actual request method.

    This is usually harmless since no method is actually being overwritten.

    '
  stages:
  - input:
      dest_addr: 127.0.0.1
      port: 8111
      method: POST
      uri: /users/sign_out
      data: _method=post&authenticity_token=something
      headers:
        User-Agent: OWASP CRS test agent
        Host: localhost
        Accept: '*/*'
      protocol: http
    output:
      status:
      - 200
      - 404
