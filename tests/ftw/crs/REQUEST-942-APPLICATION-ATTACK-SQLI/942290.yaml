meta:
  author: csanders-git, azurit
rule_id: 942290
tests:
- test_id: 1
  desc: Test as described in http://www.client9.com/article/five-interesting-injection-attacks/
  stages:
  - input:
      dest_addr: 127.0.0.1
      method: GET
      port: 8111
      uri: /get/mongo/show.php?u_id[$ne]=2
      headers:
        User-Agent: OWASP CRS test agent
        Host: localhost
        Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
      version: HTTP/1.1
      protocol: http
    output:
      status: 403
- test_id: 2
  desc: basic MongoDB NOSQL injection attempts
  stages:
  - input:
      dest_addr: 127.0.0.1
      headers:
        Host: localhost
        User-Agent: OWASP CRS test agent
        Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
      method: GET
      port: 8111
      uri: /get?mongoQ=%5b%24lte%5dasdfsd
      version: HTTP/1.1
      protocol: http
    output:
      status: 403
- test_id: 3
  desc: basic MongoDB NOSQL injection attempts 2
  stages:
  - input:
      dest_addr: 127.0.0.1
      headers:
        Host: localhost
        User-Agent: OWASP CRS test agent
        Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
      method: GET
      port: 8111
      uri: /get/mongo/show.php?u_id[$regex]=2
      version: HTTP/1.1
      protocol: http
    output:
      status: 403
- test_id: 4
  desc: basic MongoDB NOSQL injection attempts 3
  stages:
  - input:
      dest_addr: 127.0.0.1
      headers:
        Host: localhost
        User-Agent: OWASP CRS test agent
        Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
      method: GET
      port: 8111
      uri: /get/mongo/show.php?u_id[$regex]=2
      version: HTTP/1.1
      protocol: http
    output:
      status: 403
- test_id: 5
  desc: basic MongoDB NOSQL injection attempts 4
  stages:
  - input:
      dest_addr: 127.0.0.1
      headers:
        Accept: '*/*'
        Host: localhost
        User-Agent: OWASP CRS test agent
        Content-Type: application/json
      method: POST
      port: 8111
      uri: /api/echo
      data: '{"$not": "foo"}'
      version: HTTP/1.1
      protocol: http
    output:
      status: 403
- test_id: 6
