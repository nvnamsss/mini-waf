- test_id: 10
  desc: 'Word boundary: $exists as standalone operator still triggers'
  stages:
  - input:
      dest_addr: 127.0.0.1
      headers:
        Accept: '*/*'
        Host: localhost
        User-Agent: OWASP CRS test agent
        Content-Type: application/json
      method: POST
      port: 8111
      uri: /api/echo
      data: '{"user": {"$exists": true}}'
      version: HTTP/1.1
      protocol: http
    output:
      status: 403
- test_id: 11
  desc: 'Word boundary: $existingUser should NOT trigger (prefix match FP)'
  stages:
  - input:
      dest_addr: 127.0.0.1
      headers:
        Accept: '*/*'
        Host: localhost
        User-Agent: OWASP CRS test agent
        Cookie: $existingUser=admin
      method: GET
      port: 8111
      uri: /get
      version: HTTP/1.1
      protocol: http
    output:
      status:
      - 200
      - 404
- test_id: 12
  desc: 'Word boundary: $existsor should NOT trigger (prefix match FP)'
  stages:
  - input:
      dest_addr: 127.0.0.1
      headers:
        Accept: '*/*'
        Host: localhost
        User-Agent: OWASP CRS test agent
        Content-Type: application/json
      method: POST
      port: 8111
      uri: /api/echo
      data: '{"$existsor": "foo"}'
      version: HTTP/1.1
      protocol: http
    output:
      status:
      - 200
      - 404
