meta:
  author: Christian S.J. Peron, azurit
rule_id: 941270
tests:
- test_id: 1
  desc: IE XSS Filters
  stages:
  - input:
      dest_addr: 127.0.0.1
      headers:
        Host: localhost
        User-Agent: OWASP CRS test agent
        Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
      method: GET
      port: 8111
      uri: /get?var=%3clink%20%2f%20asdf%20href%20%20%2f%3d%20
      version: HTTP/1.1
      protocol: http
    output:
      status: 403
- test_id: 2
  desc: XSS test based on portswigger XSS cheatsheet
  stages:
  - input:
      dest_addr: 127.0.0.1
      headers:
        Host: localhost
        User-Agent: OWASP CRS test agent
        Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
      method: POST
      port: 8111
      uri: /api/echo
      version: HTTP/1.1
      data: payload=<link href="xss.js" rel=stylesheet type="text/javascript"></a>
      protocol: http
    output:
      status: 403
